<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پنل گارسون - {{ restaurant.title }}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Vazir', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
        }

        .order-card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-right: 4px solid #3b82f6;
            transition: all 0.3s ease;
        }

        .order-card.new {
            border-right-color: #10b981;
            animation: pulse 2s infinite;
        }

        .order-card.urgent {
            border-right-color: #ef4444;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .sound-alert {
            animation: soundAlert 1s ease-in-out infinite;
        }

        @keyframes soundAlert {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="min-h-screen bg-gray-50">
        <!-- هدر -->
        <header class="bg-white shadow-sm border-b">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center py-4">
                    <div class="flex items-center space-x-4 space-x-reverse">
                        <div class="bg-blue-500 text-white p-2 rounded-lg">
                            <i class="fas fa-utensils"></i>
                        </div>
                        <div>
                            <h1 class="text-xl font-bold text-gray-900">پنل گارسون</h1>
                            <p class="text-sm text-gray-500">{{ restaurant.title }}</p>
                        </div>
                    </div>

                    <div class="flex items-center space-x-4 space-x-reverse">
                        <div id="connectionStatus" class="flex items-center space-x-2 space-x-reverse">
                            <div class="w-3 h-3 bg-red-500 rounded-full animate-pulse"></div>
                            <span class="text-sm text-gray-600">در حال اتصال...</span>
                        </div>

                        <div class="text-right">
                            <div class="font-medium text-gray-900">{{ waiter.fullname }}</div>
                            <div class="text-sm text-gray-500">{{ waiter.code }}</div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- آمار -->
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
                <div class="bg-white rounded-lg shadow p-4">
                    <div class="flex items-center">
                        <div class="bg-blue-100 p-3 rounded-lg">
                            <i class="fas fa-clock text-blue-600"></i>
                        </div>
                        <div class="mr-3">
                            <p class="text-sm text-gray-500">سفارش‌های در انتظار</p>
                            <p class="text-2xl font-bold text-gray-900" id="pendingOrders">0</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-4">
                    <div class="flex items-center">
                        <div class="bg-green-100 p-3 rounded-lg">
                            <i class="fas fa-check text-green-600"></i>
                        </div>
                        <div class="mr-3">
                            <p class="text-sm text-gray-500">سفارش‌های تکمیل شده</p>
                            <p class="text-2xl font-bold text-gray-900" id="completedOrders">0</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-4">
                    <div class="flex items-center">
                        <div class="bg-orange-100 p-3 rounded-lg">
                            <i class="fas fa-utensils text-orange-600"></i>
                        </div>
                        <div class="mr-3">
                            <p class="text-sm text-gray-500">سفارش امروز</p>
                            <p class="text-2xl font-bold text-gray-900" id="todayOrders">0</p>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-lg shadow p-4">
                    <div class="flex items-center">
                        <div class="bg-purple-100 p-3 rounded-lg">
                            <i class="fas fa-money-bill-wave text-purple-600"></i>
                        </div>
                        <div class="mr-3">
                            <p class="text-sm text-gray-500">درآمد امروز</p>
                            <p class="text-2xl font-bold text-gray-900" id="todayRevenue">0</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- لیست سفارش‌ها -->
            <div class="bg-white rounded-lg shadow">
                <div class="px-6 py-4 border-b">
                    <h2 class="text-lg font-semibold text-gray-900">سفارش‌های جدید</h2>
                </div>

                <div class="p-6">
                    <div id="ordersContainer">
                        <div class="text-center py-8 text-gray-500">
                            <i class="fas fa-inbox text-4xl mb-3 opacity-50"></i>
                            <p>هنوز سفارشی دریافت نکرده‌اید</p>
                            <p class="text-sm mt-1">سفارش‌های جدید به صورت خودکار در اینجا نمایش داده می‌شوند</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        class WaiterPanel {
            constructor(restaurantId, waiterId) {
                this.restaurantId = restaurantId;
                this.waiterId = waiterId;
                this.orders = [];
                this.socket = null;
                this.isConnected = false;

                this.connect();
                this.initializeStats();
            }

            connect() {
                const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${protocol}//${window.location.host}/ws/waiter/orders/${this.restaurantId}/`;

                this.socket = new WebSocket(wsUrl);

                this.socket.onopen = () => {
                    console.log('Connected to orders channel');
                    this.isConnected = true;
                    this.updateConnectionStatus('connected', 'متصل به سیستم');
                };

                this.socket.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    this.handleOrderMessage(data);
                };

                this.socket.onclose = () => {
                    console.log('Disconnected from orders channel');
                    this.isConnected = false;
                    this.updateConnectionStatus('disconnected', 'اتصال قطع شد');

                    // تلاش برای اتصال مجدد
                    setTimeout(() => this.connect(), 3000);
                };

                this.socket.onerror = (error) => {
                    console.error('WebSocket error:', error);
                    this.updateConnectionStatus('error', 'خطا در اتصال');
                };
            }

            updateConnectionStatus(status, message) {
                const statusElement = document.getElementById('connectionStatus');
                const dot = statusElement.querySelector('div');
                const text = statusElement.querySelector('span');

                text.textContent = message;

                dot.className = 'w-3 h-3 rounded-full ' + (
                    status === 'connected' ? 'bg-green-500' :
                    status === 'disconnected' ? 'bg-red-500 animate-pulse' :
                    'bg-yellow-500 animate-pulse'
                );
            }

            handleOrderMessage(data) {
                switch (data.type) {
                    case 'new_order':
                        this.addNewOrder(data.order_data);
                        break;
                    case 'order_status_update':
                        this.updateOrderStatus(data.order_data);
                        break;
                }
            }

            addNewOrder(orderData) {
                // اضافه کردن سفارش جدید به لیست
                this.orders.unshift({
                    ...orderData,
                    status: 'new',
                    receivedAt: new Date()
                });

                this.renderOrders();
                this.updateStats();
                this.playNotificationSound();
                this.showDesktopNotification(orderData);
            }

            renderOrders() {
                const container = document.getElementById('ordersContainer');

                if (this.orders.length === 0) {
                    container.innerHTML = `
                        <div class="text-center py-8 text-gray-500">
                            <i class="fas fa-inbox text-4xl mb-3 opacity-50"></i>
                            <p>هنوز سفارشی دریافت نکرده‌اید</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = this.orders.map(order => `
                    <div class="order-card ${order.status === 'new' ? 'new' : ''}" data-order-id="${order.id}">
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center space-x-3 space-x-reverse">
                                <div class="bg-blue-100 text-blue-600 p-2 rounded-lg">
                                    <i class="fas fa-table"></i>
                                </div>
                                <div>
                                    <h3 class="font-semibold text-gray-900">میز ${order.table_number}</h3>
                                    <p class="text-sm text-gray-500">${this.formatTime(order.receivedAt)}</p>
                                </div>
                            </div>

                            <div class="flex items-center space-x-2 space-x-reverse">
                                <span class="status-badge ${
                                    order.status === 'new' ? 'bg-green-100 text-green-800' :
                                    'bg-blue-100 text-blue-800'
                                }">
                                    ${order.status === 'new' ? 'جدید' : 'در حال آماده‌سازی'}
                                </span>
                                <button class="accept-order-btn bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded-lg text-sm transition-colors" data-order-id="${order.id}">
                                    پذیرش سفارش
                                </button>
                            </div>
                        </div>

                        <div class="mb-3">
                            ${order.items.map(item => `
                                <div class="flex justify-between items-center py-2 border-b border-gray-100 last:border-b-0">
                                    <div class="flex items-center space-x-3 space-x-reverse">
                                        ${item.image ?
                                            `<img src="${item.image}" alt="${item.title}" class="w-10 h-10 rounded-lg object-cover">` :
                                            `<div class="w-10 h-10 rounded-lg bg-gray-200 flex items-center justify-center">
                                                <i class="fas fa-utensils text-gray-400"></i>
                                            </div>`
                                        }
                                        <div>
                                            <div class="font-medium text-gray-800">${item.title}</div>
                                            <div class="text-sm text-gray-500">${item.price.toLocaleString()} تومان</div>
                                        </div>
                                    </div>
                                    <div class="text-left">
                                        <div class="font-semibold text-gray-800">${item.quantity} ×</div>
                                        <div class="text-sm text-gray-600">${item.totalPrice.toLocaleString()} تومان</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="flex justify-between items-center pt-3 border-t border-gray-200">
                            <div class="text-sm text-gray-600">
                                ${order.customer_notes ? `یادداشت: ${order.customer_notes}` : 'بدون یادداشت'}
                            </div>
                            <div class="text-lg font-bold text-gray-900">
                                ${order.total_price.toLocaleString()} تومان
                            </div>
                        </div>
                    </div>
                `).join('');

                // اضافه کردن event listeners برای دکمه‌ها
                this.addOrderEventListeners();
            }

            addOrderEventListeners() {
                document.querySelectorAll('.accept-order-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        const orderId = e.target.getAttribute('data-order-id');
                        this.acceptOrder(orderId);
                    });
                });
            }

            acceptOrder(orderId) {
                const order = this.orders.find(o => o.id === orderId);
                if (order) {
                    order.status = 'accepted';
                    this.renderOrders();
                    this.updateStats();

                    // ارسال وضعیت به سرور
                    if (this.isConnected) {
                        this.socket.send(JSON.stringify({
                            type: 'order_status_update',
                            order_data: {
                                id: orderId,
                                status: 'accepted',
                                waiter_id: this.waiterId
                            }
                        }));
                    }

                    this.showNotification(`سفارش میز ${order.table_number} پذیرفته شد`);
                }
            }

            updateStats() {
                const pending = this.orders.filter(o => o.status === 'new').length;
                const completed = this.orders.filter(o => o.status === 'completed').length;
                const today = this.orders.filter(o => {
                    const orderDate = new Date(o.receivedAt);
                    const today = new Date();
                    return orderDate.toDateString() === today.toDateString();
                }).length;
                const revenue = this.orders
                    .filter(o => o.status === 'completed')
                    .reduce((sum, order) => sum + order.total_price, 0);

                document.getElementById('pendingOrders').textContent = pending;
                document.getElementById('completedOrders').textContent = completed;
                document.getElementById('todayOrders').textContent = today;
                document.getElementById('todayRevenue').textContent = revenue.toLocaleString();
            }

            playNotificationSound() {
                // پخش صدای اعلان
                const audio = new Audio('data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA');
                audio.play().catch(() => {
                    // اگر پخش صدا با خطا مواجه شد، از صدای سیستم استفاده کن
                    console.log('Notification sound played');
                });
            }

            showDesktopNotification(orderData) {
                if ('Notification' in window && Notification.permission === 'granted') {
                    new Notification('سفارش جدید', {
                        body: `سفارش جدید از میز ${orderData.table_number}`,
                        icon: '/static/images/logo.png'
                    });
                }
            }

            showNotification(message) {
                // ایجاد نوتیفیکیشن موقت
                const notification = document.createElement('div');
                notification.className = 'fixed top-4 left-4 z-50 bg-green-500 text-white px-4 py-2 rounded-lg shadow-lg';
                notification.textContent = message;

                document.body.appendChild(notification);

                setTimeout(() => {
                    if (notification.parentNode) {
                        notification.parentNode.removeChild(notification);
                    }
                }, 3000);
            }

            formatTime(date) {
                return new Date(date).toLocaleTimeString('fa-IR', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }

            initializeStats() {
                // بارگذاری آمار اولیه از سرور
                this.updateStats();
            }
        }

        // مقداردهی اولیه پنل گارسون
        document.addEventListener('DOMContentLoaded', function() {
            const restaurantId = '{{ restaurant.id }}';
            const waiterId = '{{ waiter.id }}';

            window.waiterPanel = new WaiterPanel(restaurantId, waiterId);

            // درخواست مجوز برای نوتیفیکیشن دسکتاپ
            if ('Notification' in window && Notification.permission === 'default') {
                Notification.requestPermission();
            }
        });
    </script>
</body>
</html>
