<div class="content-section">
    {% for content in contents %}
    <div class="content-item {% cycle 'right-image' 'left-image' %}">
        <div class="content-wrapper">

            <!-- عکس -->
            <div class="content-image-side">
                <div class="image-wrapper">
                    <img
                        src="{{ content.image.url }}"
                        alt="{{ content.title }}"
                        class="content-image"
                    >
                </div>
            </div>

            <!-- عنوان -->
            <div class="content-title-side">
                <h2 class="content-title">{{ content.title }}</h2>
            </div>

        </div>
    </div>
    {% endfor %}
</div>

<style>
/* استایل‌های اصلی */
.content-section {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem 1rem;
}

.content-item {
    margin-bottom: 3rem;
}

.content-wrapper {
    display: flex;
    align-items: center;
    gap: 3rem;
    min-height: 400px;
}

/* حالت اول: عکس سمت راست، عنوان سمت چپ */
.content-item.right-image .content-wrapper {
    direction: rtl;
}

.content-item.right-image .content-image-side {
    order: 2;
}

.content-item.right-image .content-title-side {
    order: 1;
    text-align: left;
}

/* حالت دوم: عکس سمت چپ، عنوان سمت راست */
.content-item.left-image .content-wrapper {
    direction: ltr;
}

.content-item.left-image .content-image-side {
    order: 1;
}

.content-item.left-image .content-title-side {
    order: 2;
    text-align: right;
}

/* استایل عکس */
.content-image-side {
    flex: 1;
}

.image-wrapper {
    position: relative;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
}

.content-image {
    width: 100%;
    height: 350px;
    object-fit: cover;
    display: block;
    transition: transform 0.5s ease;
}

.image-wrapper:hover .content-image {
    transform: scale(1.05);
}

/* استایل عنوان */
.content-title-side {
    flex: 1;
    padding: 2rem;
}

.content-title {
    font-size: 3rem;
    font-weight: 800;
    line-height: 1.3;
    color: #2c3e50;
    margin: 0;
}

/* ریسپانسیو */
@media (max-width: 1024px) {
    .content-wrapper {
        flex-direction: column;
        gap: 2rem;
    }

    .content-item.right-image .content-wrapper,
    .content-item.left-image .content-wrapper {
        direction: rtl;
    }

    .content-item.right-image .content-image-side,
    .content-item.left-image .content-image-side {
        order: 1;
    }

    .content-item.right-image .content-title-side,
    .content-item.left-image .content-title-side {
        order: 2;
        text-align: center;
    }

    .content-title {
        font-size: 2.5rem;
    }
}

@media (max-width: 768px) {
    .content-image {
        height: 250px;
    }

    .content-title {
        font-size: 2rem;
    }

    .content-wrapper {
        min-height: 300px;
    }
}
</style>
